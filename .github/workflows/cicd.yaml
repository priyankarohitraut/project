name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t project:v1 .

    - name: Push Docker Image
      run: docker run -d -p 8080:80 project:v1

